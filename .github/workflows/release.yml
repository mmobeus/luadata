name: Release

concurrency:
  group: release
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*-rc.*"

jobs:
  build-clib:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux_amd64
            lib_name: libluadata_clib.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux_arm64
            lib_name: libluadata_clib.so
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin_amd64
            lib_name: libluadata_clib.dylib
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin_arm64
            lib_name: libluadata_clib.dylib
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows_amd64
            lib_name: luadata_clib.dll

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build cdylib
        run: cargo build -p luadata_clib --release --target ${{ matrix.target }}

      - name: Upload shared library
        uses: actions/upload-artifact@v7
        with:
          name: clib-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib_name }}

  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin_amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin_arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p luadata_cli --release --target ${{ matrix.target }}

      - name: Create tarball
        run: tar -czf luadata-${{ matrix.platform }}.tar.gz -C target/${{ matrix.target }}/release luadata

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.platform }}
          path: luadata-${{ matrix.platform }}.tar.gz

  build-node:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: node
        run: npm install

      - name: Build native module
        working-directory: node
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.target }}
          path: node/*.node

  test-and-release:
    needs: [build-clib, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Test Rust
        run: cargo test -p luadata

      - name: Download all shared libraries
        uses: actions/download-artifact@v8
        with:
          pattern: clib-*
          path: clib-artifacts

      - name: Test Go wrapper
        run: |
          LUADATA_LIB_PATH=${{ github.workspace }}/clib-artifacts/clib-linux_amd64/libluadata_clib.so \
            go test -C go -v ./...

      - name: Compute release tag
        id: release_tag
        run: |
          RC_TAG="${{ github.ref_name }}"
          RELEASE_TAG="${RC_TAG%%-rc.*}"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release branch and tag
        run: bash scripts/prepare-release.sh "${{ steps.release_tag.outputs.tag }}" clib-artifacts

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: cli-artifacts
          merge-multiple: true

      - name: Compute CLI SHA256 sums
        id: cli_sha
        run: |
          echo "darwin_amd64=$(shasum -a 256 cli-artifacts/luadata-darwin_amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(shasum -a 256 cli-artifacts/luadata-darwin_arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts with platform
        run: |
          for dir in clib-artifacts/clib-*; do
            platform="${dir##*clib-}"
            for file in "$dir"/*; do
              base="$(basename "$file")"
              name="${base%.*}"
              ext="${base##*.}"
              mv "$file" "$dir/${name}-${platform}.${ext}"
            done
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" \
            --title "${{ steps.release_tag.outputs.tag }}" \
            --generate-notes \
            clib-artifacts/clib-*/* \
            cli-artifacts/luadata-*.tar.gz

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: mmobeus
          repositories: homebrew-tap

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          VERSION="${{ steps.release_tag.outputs.tag }}"
          gh api repos/mmobeus/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[sha256_amd64]=${{ steps.cli_sha.outputs.darwin_amd64 }}" \
            -f "client_payload[sha256_arm64]=${{ steps.cli_sha.outputs.darwin_arm64 }}"

  build-python-wheels:
    needs: test-and-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            maturin_args: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            maturin_args: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            maturin_args: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: |
          cd python
          maturin build --release --target ${{ matrix.target }} --out ../wheels/ ${{ matrix.maturin_args }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.target }}
          path: wheels/*.whl

  build-python-sdist:
    needs: test-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out wheels/ -m python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: wheels/*.tar.gz

  publish-python:
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi

    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v8
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-npm:
    needs: test-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build WASM into node-wasm package
        run: |
          wasm-pack build wasm --target bundler --out-dir ../node-wasm/wasm
          rm -f node-wasm/wasm/package.json node-wasm/wasm/.gitignore

      - name: Publish to npm
        working-directory: node-wasm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ""

  publish-node:
    needs: [test-and-release, build-node]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: node
        run: npm install

      - name: Download all node artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: node-*
          path: node/artifacts

      - name: Move artifacts to platform packages
        working-directory: node
        run: npx napi artifacts --output-dir artifacts

      - name: Publish platform packages
        working-directory: node
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              npm publish "$dir" --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ""

      - name: Publish root package
        working-directory: node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ""

  publish-crates:
    needs: test-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: crates-io

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: |
          cargo publish -p luadata
          sleep 30
          cargo publish -p luadata_cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  bump-main-version:
    needs: test-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version files
        run: |
          TAG="${{ needs.test-and-release.outputs.release_tag }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "s/luadata = { version = \"[^\"]*\"/luadata = { version = \"${VERSION}\"/" cli/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" node-wasm/package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" node/package.json
          for f in node/npm/*/package.json; do
            sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$f"
          done
          sed -i "s/\"@mmobeus\/luadata-\([^\"]*\)\": \"[^\"]*\"/\"@mmobeus\/luadata-\1\": \"${VERSION}\"/" node/package.json
          cargo generate-lockfile
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="version-bump/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Cargo.toml cli/Cargo.toml node-wasm/package.json node/package.json node/npm/*/package.json Cargo.lock
          git commit -m "Bump version to ${VERSION} after release"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Bump version to ${VERSION}" \
            --body "Automated version bump after release of v${VERSION}."
