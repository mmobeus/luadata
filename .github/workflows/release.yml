name: Release

concurrency:
  group: release
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*-rc.*"

jobs:
  build-clib:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux_amd64
            lib_name: libluadata_clib.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux_arm64
            lib_name: libluadata_clib.so
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin_amd64
            lib_name: libluadata_clib.dylib
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin_arm64
            lib_name: libluadata_clib.dylib
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows_amd64
            lib_name: luadata_clib.dll

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build cdylib
        run: cargo build -p luadata_clib --release --target ${{ matrix.target }}

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: clib-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib_name }}

  test-and-release:
    needs: build-clib
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go/go.mod

      - name: Test Rust
        run: cargo test -p luadata

      - name: Download all shared libraries
        uses: actions/download-artifact@v4
        with:
          pattern: clib-*
          path: clib-artifacts

      - name: Test Go wrapper
        run: |
          LUADATA_LIB_PATH=${{ github.workspace }}/clib-artifacts/clib-linux_amd64/libluadata_clib.so \
            go test -C go -v ./...

      - name: Compute release tag
        id: release_tag
        run: |
          RC_TAG="${{ github.ref_name }}"
          RELEASE_TAG="${RC_TAG%%-rc.*}"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release branch and tag
        run: bash scripts/prepare-release.sh "${{ steps.release_tag.outputs.tag }}" clib-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" \
            --title "${{ steps.release_tag.outputs.tag }}" \
            --generate-notes \
            clib-artifacts/clib-*/libluadata_clib.* \
            clib-artifacts/clib-*/luadata_clib.*

  build-python-wheels:
    needs: test-and-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            maturin_args: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            maturin_args: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            maturin_args: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: |
          cd python
          maturin build --release --target ${{ matrix.target }} --out ../wheels/ ${{ matrix.maturin_args }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: wheels/*.whl

  build-python-sdist:
    needs: test-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out wheels/ -m python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: wheels/*.tar.gz

  publish-python:
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi

    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-npm:
    needs: test-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build WASM into npm package
        run: |
          wasm-pack build wasm --target bundler --out-dir ../npm/wasm
          rm -f npm/wasm/package.json npm/wasm/.gitignore

      - name: Set package version from Cargo workspace
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cd npm && npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public

  publish-crates:
    needs: test-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: crates-io

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.test-and-release.outputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish -p luadata
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
