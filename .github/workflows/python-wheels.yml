name: Python Wheels

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-clib:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            lib_ext: .so
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            lib_ext: .so
          - target: macos-x64
            runner: macos-13
            lib_ext: .dylib
          - target: macos-arm64
            runner: macos-latest
            lib_ext: .dylib
          - target: windows-x64
            runner: windows-latest
            lib_ext: .dll

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Install MinGW
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v2

      - name: Build shared library
        run: go build -buildmode=c-shared -o libluadata${{ matrix.lib_ext }} ./clib
        env:
          CGO_ENABLED: "1"
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: clib-${{ matrix.target }}
          path: libluadata${{ matrix.lib_ext }}

  build-wheels:
    needs: build-clib
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build "wheel>=0.40"

      - name: Download all shared libraries
        uses: actions/download-artifact@v4
        with:
          pattern: clib-*
          path: clib-artifacts

      - name: Build platform wheels
        run: |
          mkdir -p wheels

          declare -A PLATFORM_TAGS=(
            ["linux-x64"]="manylinux_2_17_x86_64"
            ["linux-arm64"]="manylinux_2_17_aarch64"
            ["macos-x64"]="macosx_11_0_x86_64"
            ["macos-arm64"]="macosx_11_0_arm64"
            ["windows-x64"]="win_amd64"
          )

          for target in "${!PLATFORM_TAGS[@]}"; do
            tag="${PLATFORM_TAGS[$target]}"
            echo "::group::Building wheel for ${target} (${tag})"

            # Copy shared lib into package dir
            cp clib-artifacts/clib-${target}/libluadata.* python/luadata/

            # Build wheel
            python -m build --wheel python/

            # Retag with platform
            python -m wheel tags --remove --platform-tag "${tag}" python/dist/*.whl

            # Move to output dir
            mv python/dist/*.whl wheels/

            # Clean for next iteration
            rm -f python/luadata/libluadata.*
            rm -rf python/dist/

            echo "::endgroup::"
          done

          echo "Built wheels:"
          ls -la wheels/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels/*.whl

  publish:
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: dist/

      - name: Attach wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" dist/*.whl --repo "${{ github.repository }}"
