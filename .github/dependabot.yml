version: 2
updates:
  # Go modules
  - package-ecosystem: 'gomod'
    directory: '/go'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'go'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # Rust/Cargo
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'rust'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # Python/pip
  - package-ecosystem: 'pip'
    directory: '/python'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # npm (WASM browser package)
  - package-ecosystem: 'npm'
    directory: '/node-wasm'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # npm (Node.js native addon)
  - package-ecosystem: 'npm'
    directory: '/node'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci/cd'
    commit-message:
      prefix: 'ci'
      include: 'scope'